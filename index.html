<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Portfolio de inversiones - CEDEARs y Fondos">
<title>Portfolio · Nico</title>

<!-- PWA manifest inline -->
<link rel="manifest" href="manifest.json">

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #ffffff0d;
    --border2: #ffffff18;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top) 0 0;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); }

  #refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #refresh-btn:active { transform: scale(0.95); background: var(--accent); border-color: var(--accent); }
  #refresh-btn.loading .icon { animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .last-update {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    padding: 4px 20px 8px;
    letter-spacing: 0.04em;
  }

  /* ── TABS ── */
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    padding: 12px 4px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent);
  }

  .tab-icon { font-size: 16px; display: block; margin-bottom: 3px; }

  /* ── CONTENT ── */
  .content { padding: 20px 16px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); max-width: 500px; margin: 0 auto; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.25s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
  }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 6px;
    margin-top: 6px;
  }

  .badge.up { background: #34d39920; color: var(--green); }
  .badge.down { background: #f8717120; color: var(--red); }
  .badge.neutral { background: #fbbf2420; color: var(--yellow); }

  /* ── SUMMARY GRID ── */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .summary-card .label { font-size: 10px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .summary-card .value { font-family: var(--mono); font-size: 18px; font-weight: 600; margin-top: 4px; }

  /* ── ALLOCATION BAR ── */
  .alloc-bar {
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
    height: 8px;
    display: flex;
    margin: 12px 0 6px;
  }

  .alloc-segment { height: 100%; transition: width 0.5s ease; }

  .alloc-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    margin-top: 8px;
  }

  .alloc-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .alloc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; }

  .data-table th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }

  .data-table th:first-child { text-align: left; }

  .data-table td {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    vertical-align: middle;
  }

  .data-table td:first-child { text-align: left; font-size: 12px; max-width: 90px; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr { transition: background 0.15s; }
  .data-table tr:hover td { background: var(--surface2); }

  .ticker {
    font-weight: 600;
    color: var(--accent2);
    display: block;
  }

  .ticker-name {
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
    font-weight: 400;
  }

  .positive { color: var(--green); }
  .negative { color: var(--red); }

  /* ── COTIZACIONES STRIP ── */
  .quotes-strip {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .quotes-strip::-webkit-scrollbar { display: none; }

  .quote-pill {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 100px;
  }

  .quote-pill .q-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .quote-pill .q-value { font-family: var(--mono); font-size: 17px; font-weight: 600; margin-top: 3px; }

  /* ── CHART ── */
  .chart-container { position: relative; height: 220px; margin: 8px 0 16px; }

  canvas { border-radius: 8px; }

  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── LOADING / ERROR ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .loader-ring {
    width: 40px; height: 40px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loader-text { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .error-msg {
    background: #f8717115;
    border: 1px solid #f8717130;
    border-radius: 10px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    margin-bottom: 12px;
  }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* ── PIE CHART SVG ── */
  .pie-wrap { display: flex; align-items: center; gap: 20px; margin: 8px 0; }
  .pie-wrap svg { flex-shrink: 0; }
  .pie-legend { flex: 1; }
  .pie-legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
  .pie-legend-item .pct { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">portfolio<span>·nico</span></div>
    <button id="refresh-btn" onclick="loadAll()">
      <span class="icon">↻</span> Actualizar
    </button>
  </div>
  <div class="last-update" id="last-update">—</div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="resumen"><span class="tab-icon">◈</span>Resumen</div>
  <div class="tab" data-tab="fondos"><span class="tab-icon">◉</span>Fondos</div>
  <div class="tab" data-tab="cedears"><span class="tab-icon">▦</span>CEDEARs</div>
  <div class="tab" data-tab="graficos"><span class="tab-icon">◌</span>Gráficos</div>
</div>

<div class="content">

  <!-- RESUMEN -->
  <div class="panel active" id="panel-resumen">
    <div id="resumen-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">Cargando...</div></div>
    </div>
  </div>

  <!-- FONDOS -->
  <div class="panel" id="panel-fondos">
    <div id="fondos-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">Cargando...</div></div>
    </div>
  </div>

  <!-- CEDEARS -->
  <div class="panel" id="panel-cedears">
    <div id="cedears-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">Cargando...</div></div>
    </div>
  </div>

  <!-- GRAFICOS -->
  <div class="panel" id="panel-graficos">
    <div id="graficos-content">
      <div class="loader"><div class="loader-ring"></div><div class="loader-text">Cargando...</div></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SHEET_ID = '1JlT182-Rc6IXhJM2xOiq0zl-usANXSLKA1mXqPXkLTQ';
const SHEET_NAME = 'Inversiones';

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'graficos') renderCharts();
  });
});

// ═══════════════════════════════════════════
// FETCH SHEET DATA via gviz/tq
// ═══════════════════════════════════════════
async function fetchRange(range) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&range=${range}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  return parseCSV(text);
}

async function fetchTab(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} fetching tab: ${tabName}`);
  const text = await resp.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let inQuote = false, val = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuote = !inQuote; }
      else if (c === ',' && !inQuote) { cols.push(val.trim()); val = ''; }
      else { val += c; }
    }
    cols.push(val.trim());
    return cols;
  });
}

function num(s) {
  if (!s) return 0;
  return parseFloat(String(s).replace(/[^0-9.\-]/g, '')) || 0;
}

function fmt(n, decimals = 2) {
  if (isNaN(n) || n === null) return '—';
  return n.toLocaleString('es-AR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtARS(n) {
  if (isNaN(n) || n === null) return '—';
  return '$' + fmt(n, 0);
}

function fmtPct(n) {
  const cls = n >= 0 ? 'positive' : 'negative';
  const sign = n >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${fmt(n)}%</span>`;
}

// ═══════════════════════════════════════════
// MAIN LOAD
// ═══════════════════════════════════════════
let DATA = { fondos: [], cotizaciones: [], cedears: [] };
let chartsRendered = false;

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  chartsRendered = false;

  try {
    const [fondosRaw, cotizRaw, cedearRaw] = await Promise.all([
      fetchTab('FCIs'),
      fetchTab('Cotizaciones'),
      fetchTab('CEDEARs'),
    ]);

    DATA.fondos = parseFondos(fondosRaw);
    DATA.cotizaciones = parseCotizaciones(cotizRaw);
    DATA.cedears = parseCedears(cedearRaw);

    renderResumen();
    renderFondos();
    renderCedears();

    const now = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('last-update').textContent = `↻ actualizado ${now}`;

    if (document.getElementById('panel-graficos').classList.contains('active')) {
      renderCharts();
    }
  } catch (e) {
    console.error(e);
    showError('No se pudo conectar con el sheet. Verificá tu conexión.');
  }

  btn.classList.remove('loading');
}

function showError(msg) {
  const html = `<div class="error-msg">⚠ ${msg}</div>`;
  ['resumen', 'fondos', 'cedears', 'graficos'].forEach(p => {
    const el = document.getElementById(`${p}-content`);
    if (el) el.innerHTML = html;
  });
}

// ═══════════════════════════════════════════
// PARSERS
// ═══════════════════════════════════════════
function parseFondos(rows) {
  // Tab FCIs — fila 0: título, fila 1: headers, filas 2-4: datos, fila 5: TOTAL
  // Cols: A=Activo, B=Monto (ARS), C=En USD, D=% del Portfolio
  const result = [];
  rows.forEach(row => {
    const nombre = (row[0] || '').trim();
    if (!nombre) return;
    if (nombre.toLowerCase() === 'activo') return;
    if (nombre.toLowerCase().includes('total')) return;
    if (nombre.toUpperCase().includes('FONDOS COMUNES')) return;
    result.push({
      nombre:       nombre,
      montoTexto:   (row[1] || '').trim(),   // ej "$8,344,218.00"
      monto:        num(row[1]),
      usdTexto:     (row[2] || '').trim(),   // ej "6,000.00 US$"
      montoUSD:     num(row[2]),
      pctTexto:     (row[3] || '').trim(),   // ej "65.4%"
      pctPortfolio: num(row[3]),
    });
  });
  return result;
}

function parseCotizaciones(rows) {
  // Tab Cotizaciones — fila 0: título, filas 1-3: datos
  // Cols: A=Label (ej "EUR → ARS"), B=Valor texto (ej "1,623.99 ARS/€")
  const result = [];
  rows.forEach(row => {
    const nombre = (row[0] || '').trim();
    if (!nombre) return;
    if (nombre.toUpperCase().includes('COTIZACION')) return;
    result.push({
      nombre:      nombre,
      valorTexto:  (row[1] || '').trim(),  // mostrar tal cual
      valor:       num(row[1]),
    });
  });
  return result;
}

function parseCedears(rows) {
  // Tab CEDEARs — fila 0: título, fila 1: headers, filas 2-6: datos, fila 7: TOTAL
  // Cols: A=Activo, B=Nominales, C=Cantidad ARS, D=Precio promedio entrada, E=Ganancia ARS, F=% crecimiento, G=Concentración
  const result = [];
  rows.forEach(row => {
    const ticker = (row[0] || '').trim();
    if (!ticker) return;
    if (ticker.toLowerCase() === 'activo') return;
    if (ticker.toLowerCase().includes('total')) return;
    if (ticker.toUpperCase().includes('ACCIONES')) return;
    result.push({
      ticker:        ticker,
      nominales:     num(row[1]),
      valorTexto:    (row[2] || '').trim(),   // ej "265,375 ARS"
      valorTotal:    num(row[2]),
      precioEntrada: num(row[3]),             // precio promedio entrada
      gananciaTexto: (row[4] || '').trim(),   // ej "22,875 ARS"
      gananciARS:    num(row[4]),
      pnlTexto:      (row[5] || '').trim(),   // ej "9.43%"
      pnlPct:        num(row[5]),
      concTexto:     (row[6] || '').trim(),   // ej "54.0%"
      concentracion: num(row[6]),
    });
  });
  return result;
}

// ═══════════════════════════════════════════
// RENDER RESUMEN
// ═══════════════════════════════════════════
function renderResumen() {
  const totalFondos = DATA.fondos.reduce((s, f) => s + f.monto, 0);
  const totalCedears = DATA.cedears.reduce((s, c) => s + c.valorTotal, 0);
  const total = totalFondos + totalCedears;
  const pctFondos = total ? (totalFondos / total * 100) : 0;
  const pctCedears = total ? (totalCedears / total * 100) : 0;

  // Find USD → ARS rate from cotizaciones
  const usdRow = DATA.cotizaciones.find(c => c.nombre.includes('USD') && c.nombre.includes('ARS'));
  const usdRate = usdRow ? usdRow.valor : 0;
  const totalUSD = usdRate > 1 ? total / usdRate : null;

  // Allocation colors
  const COLORS = ['#7c6af7','#34d399','#fbbf24','#f87171','#60a5fa','#e879f9'];
  const allItems = [
    ...DATA.fondos.map((f, i) => ({ label: f.nombre.replace(/ \((USD|EUR|ARS)\)/g,'').split(' ')[0], valor: f.monto, color: COLORS[i % COLORS.length] })),
    ...DATA.cedears.map((c, i) => ({ label: c.ticker, valor: c.valorTotal, color: COLORS[(DATA.fondos.length + i) % COLORS.length] })),
  ].filter(x => x.valor > 0).sort((a, b) => b.valor - a.valor);

  const bars = allItems.map(item => {
    const pct = total ? (item.valor / total * 100) : 0;
    return `<div class="alloc-segment" style="width:${pct}%;background:${item.color}"></div>`;
  }).join('');

  const legend = allItems.slice(0, 8).map(item => {
    const pct = total ? (item.valor / total * 100).toFixed(1) : 0;
    return `<div class="alloc-item"><div class="alloc-dot" style="background:${item.color}"></div>${item.label} <span style="margin-left:auto;font-family:var(--mono);font-size:10px">${pct}%</span></div>`;
  }).join('');

  // Quotes strip
  const quotesHtml = DATA.cotizaciones.map(q => `
    <div class="quote-pill">
      <div class="q-label">${q.nombre}</div>
      <div class="q-value" style="font-size:13px">${q.valorTexto}</div>
    </div>
  `).join('');

  let html = `
    <div class="card" style="background:linear-gradient(135deg,#1a1030 0%,#111118 100%)">
      <div class="card-label">Patrimonio Total</div>
      <div class="card-value">${fmtARS(total)}</div>
      ${totalUSD ? `<div class="card-sub">≈ USD ${fmt(totalUSD, 0)}</div>` : ''}
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">Fondos</div>
        <div class="value" style="color:var(--accent2)">${fmtARS(totalFondos)}</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px">${fmt(pctFondos, 1)}%</div>
      </div>
      <div class="summary-card">
        <div class="label">CEDEARs</div>
        <div class="value" style="color:var(--green)">${fmtARS(totalCedears)}</div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px">${fmt(pctCedears, 1)}%</div>
      </div>
    </div>

function renderCharts() {
  if (chartsRendered) return;
  chartsRendered = true;

  const COLORS = ['#7c6af7','#34d399','#fbbf24','#f87171','#60a5fa','#e879f9','#fb923c','#38bdf8'];

  // Build pie data from CEDEARs
  const totalCedears = DATA.cedears.reduce((s, c) => s + c.valorTotal, 0);
  const totalFondos = DATA.fondos.reduce((s, f) => s + f.monto, 0);

  // Pie 1: Asset allocation (Fondos vs CEDEARs breakdown)
  const pieData1 = [];
  DATA.cedears.filter(c => c.valorTotal > 0).forEach((c, i) => {
    pieData1.push({ label: c.ticker, value: c.valorTotal, color: COLORS[i % COLORS.length] });
  });
  DATA.fondos.filter(f => f.monto > 0).forEach((f, i) => {
    pieData1.push({ label: f.nombre.split(' ')[0], value: f.monto, color: COLORS[(DATA.cedears.length + i) % COLORS.length] });
  });

  // P&L bar chart
  const pnlData = DATA.cedears.filter(c => c.ticker);

  let html = `<div class="section-title">Composición del Portfolio</div>`;
  html += buildPieChart(pieData1, 130);

  if (pnlData.length > 0) {
    html += `<div class="section-title" style="margin-top:24px">P&L por CEDEAR</div>`;
    html += buildBarChart(pnlData);
  }

  document.getElementById('graficos-content').innerHTML = html;
}

function buildPieChart(data, size) {
  if (!data.length) return '<div class="error-msg">Sin datos</div>';
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return '<div class="error-msg">Sin datos</div>';

  const cx = size / 2, cy = size / 2, r = size / 2 - 8;
  let paths = '';
  let startAngle = -Math.PI / 2;

  data.forEach(d => {
    const pct = d.value / total;
    const angle = pct * 2 * Math.PI;
    const endAngle = startAngle + angle;
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle);
    const y2 = cy + r * Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${d.color}" opacity="0.9"/>`;
    // inner ring
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="none" stroke="#0a0a0f" stroke-width="1.5"/>`;
    startAngle = endAngle;
  });

  // Donut hole
  paths += `<circle cx="${cx}" cy="${cy}" r="${r * 0.5}" fill="#111118"/>`;

  const legendItems = data.map((d, i) => {
    const pct = (d.value / total * 100).toFixed(1);
    return `<div class="pie-legend-item">
      <div class="alloc-dot" style="background:${d.color}"></div>
      <span>${d.label}</span>
      <span class="pct">${pct}%</span>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="pie-wrap">
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>
        <div class="pie-legend">${legendItems}</div>
      </div>
    </div>
  `;
}

function buildBarChart(data) {
  if (!data.length) return '';
  const maxVal = Math.max(...data.map(d => Math.abs(d.pnlPct)), 5);
  const BAR_H = 32;
  const W = 280;
  const LABEL_W = 60;
  const BAR_W = W - LABEL_W - 50;
  const svgH = data.length * (BAR_H + 6) + 20;

  let bars = '';
  data.forEach((d, i) => {
    const y = i * (BAR_H + 6);
    const isPos = d.pnlPct >= 0;
    const barW = Math.abs(d.pnlPct) / maxVal * (BAR_W * 0.5);
    const barX = isPos ? LABEL_W + BAR_W * 0.5 : LABEL_W + BAR_W * 0.5 - barW;
    const color = isPos ? '#34d399' : '#f87171';

    bars += `
      <text x="${LABEL_W - 6}" y="${y + BAR_H / 2 + 4}" text-anchor="end" fill="#9090a8" font-size="11" font-family="IBM Plex Mono">${d.ticker}</text>
      <rect x="${LABEL_W}" y="${y + 4}" width="${BAR_W}" height="${BAR_H - 8}" fill="#1a1a24" rx="4"/>
      <line x1="${LABEL_W + BAR_W * 0.5}" y1="${y + 2}" x2="${LABEL_W + BAR_W * 0.5}" y2="${y + BAR_H - 2}" stroke="#ffffff10" stroke-width="1"/>
      <rect x="${barX}" y="${y + 6}" width="${barW}" height="${BAR_H - 12}" fill="${color}" rx="3" opacity="0.85"/>
      <text x="${LABEL_W + BAR_W + 6}" y="${y + BAR_H / 2 + 4}" fill="${color}" font-size="10" font-family="IBM Plex Mono">${isPos ? '+' : ''}${d.pnlPct.toFixed(1)}%</text>
    `;
  });

  return `
    <div class="card" style="overflow-x:auto">
      <svg width="100%" viewBox="0 0 ${W} ${svgH}" style="min-width:${W}px">${bars}</svg>
    </div>
  `;
}
